/* ── Search ── */
.search-box { position: relative; }
.search-box input { width: 100%; background: white; border: 1.5px solid var(--paper-3); border-radius: 100px; padding: 10px 18px 10px 42px; font-size: 13px; color: var(--ink); outline: none; transition: border-color 0.18s; font-family: 'DM Sans', sans-serif; }

<!-- ════════════════════════════════ SCRIPTS ══════════════════════════════════ -->
<script>
/* ── M3-04: 静态 ARTICLES 已删除，改由 /api/v1/articles 动态获取 ── */

/* ── i18n 辅助：优先调用 HM_I18N.t()，回退到内置默认值 ── */
function t(key, fallback) {
  return (window.HM_I18N && window.HM_I18N.t) ? window.HM_I18N.t(key) : fallback;
}

/* ── 分类展示配置（标签文案走 i18n，样式类名固定不变） ── */
const CAT_ICONS = { market:'📊', alert:'🔴', policy:'📋', audit:'⚖', guide:'🧭' };
const CAT_I18N  = { market:'cat_market', alert:'cat_alert', policy:'cat_policy', audit:'cat_audit', guide:'cat_guide' };
const CAT_FB    = { market:'市场情报', alert:'避雷预警', policy:'政策解读', audit:'产品审计', guide:'新手指南' };

function catLabel(cat) {
  return (CAT_ICONS[cat] || '') + ' ' + t(CAT_I18N[cat], CAT_FB[cat] || cat);
}

/* ── 分页常量（服务端分页） ── */
const PAGE_SIZE = 7;

/* ── 全局状态 ── */
let ARTICLES    = [];   // 当前页数据
let TOTAL_COUNT = 0;    // 服务端返回的总条数
let currentCat  = 'all';
let currentSearch = '';
let currentPage  = 1;
let TOP_SLUG    = null;
let TOP_ARTICLE = null; // 今日要闻完整数据，跨页保持

/* ── Loading / Error 状态 ── */
function showGridLoading() {
  document.getElementById('articleList').innerHTML =
    `<div style="text-align:center;padding:60px 0;color:var(--ink-3)">
       <div style="display:inline-block;width:28px;height:28px;border:3px solid var(--paper-3);
                   border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:12px"></div>
       <p style="font-size:13px">加载中…</p>
     </div>`;
}

function showGridError(msg) {
  document.getElementById('articleList').innerHTML =
    `<div style="text-align:center;padding:60px 0;color:var(--ink-3)">
       <div style="font-size:36px;margin-bottom:12px">⚠️</div>
       <p style="font-size:13px;font-weight:600;color:var(--red);margin-bottom:8px">加载失败</p>
       <p style="font-size:12px">${msg || '请刷新页面重试'}</p>
       <button onclick="loadArticles(1)" style="margin-top:14px;padding:7px 18px;border-radius:100px;border:1.5px solid var(--blue);color:var(--blue);background:none;font-size:12px;font-weight:700;cursor:pointer">重新加载</button>
     </div>`;
}

/* ── CSS: loading spinner（注入一次，避免 tailwind 未覆盖） ── */
(function() {
  const s = document.createElement('style');
  s.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(s);
})();

/* ── 分类图标（无图时 auto-cover 用；market 用品牌字 HiMiao） ── */
const CAT_ICON = { market: '📊', alert: '🔴', policy: '📋', audit: '⚖', guide: '🧭' };

/**
 * 接口里的 category 可能是英文 key、中文「市场通讯」等；映射到现有 CSS 类名。
 */
function categoryCssClass(a) {
  const raw = a.category;
  const s = raw == null ? '' : String(raw).trim();
  const lower = s.toLowerCase();
  const map = {
    market: 'market', newsletter: 'market', market_news: 'market',
    alert: 'alert', policy: 'policy', audit: 'audit', guide: 'guide'
  };
  if (map[lower]) return map[lower];
  if (s === '市场情报' || s === '市场通讯') return 'market';
  return map[lower] || 'market';
}

/** 若封面 URL 像站点默认的「书本」占位图，也改为 HiMiao */
function looksLikeDefaultBookCover(url) {
  if (!url || typeof url !== 'string') return false;
  const u = url.toLowerCase();
  if (/book|opengraph|\/og\.|placeholder|default[_-]?thumb|favicon|thumb\/default|images\/placeholder/i.test(u)) return true;
  // 可在页面其它脚本中先赋值：window.HIMIAO_BOOK_COVER_SUBSTR = ['你的CDN域名','/path/片段'];
  try {
    const extra = window.HIMIAO_BOOK_COVER_SUBSTR;
    if (Array.isArray(extra) && extra.some((sub) => sub && u.includes(String(sub).toLowerCase()))) return true;
  } catch (e) {}
  return false;
}

/**
 * 不显示 cover_url、改用蓝底 HiMiao：① 市场类分类 ② URL 像默认书本图。
 * （若强刷仍见旧图，多半是线上未部署本文件，或分类/URL 仍不匹配，可改 looksLikeDefaultBookCover。）
 */
function useBrandInsteadOfCover(a) {
  try {
    if (window.HIMIAO_FORCE_BRAND_THUMB === true) return true;
  } catch (e) {}
  const raw = a.category;
  const s = raw == null ? '' : String(raw).trim();
  const lower = s.toLowerCase();
  if (lower === 'market' || lower === 'newsletter' || lower === 'market_news') return true;
  if (s === '市场情报' || s === '市场通讯') return true;
  if (/市场/.test(s) && /通讯|情报/.test(s)) return true;
  const url = (a.cover_url || '').trim();
  if (url && looksLikeDefaultBookCover(url)) return true;
  return false;
}

/** 缩略图区块用的渐变类：品牌占位时固定 market（蓝底 HiMiao） */
function thumbVisualClass(a) {
  return useBrandInsteadOfCover(a) ? 'market' : categoryCssClass(a);
}

/** 无封面缩略图内部 HTML：market 为蓝底 + HiMiao 文案 */
function autoCoverInner(cssClass) {
  if (cssClass === 'market') return '<span class="auto-cover-brand">HiMiao</span>';
  return CAT_ICON[cssClass] || '📰';
}

/**
 * 主列表缩略图：市场类 / 默认书本 URL → 蓝底 HiMiao，不显示该封面图。
 */
function mainListThumbHTML(a) {
  const vClass = thumbVisualClass(a);
  const icon = CAT_ICON[vClass] || '📰';
  const coverInner = autoCoverInner(vClass);
  const hasCover = !useBrandInsteadOfCover(a) && !!(a.cover_url && a.cover_url.trim());
  if (hasCover) {
    return `<div class="thumb-wrap"><img class="thumb-sm thumb-img" src="${a.cover_url}" alt="" loading="lazy" data-cat="${a.category || ''}" data-icon="${icon}"><div class="thumb-sm auto-cover ${vClass} thumb-fallback" style="display:none">${coverInner}</div></div>`;
  }
  return `<div class="thumb-sm auto-cover ${vClass}">${coverInner}</div>`;
}

/** 侧栏热读缩略图 */
function hotListThumbHTML(a) {
  const vClass = thumbVisualClass(a);
  const coverInner = autoCoverInner(vClass);
  const hasCover = !useBrandInsteadOfCover(a) && !!(a.cover_url && a.cover_url.trim());
  if (hasCover) {
    return `<div class="thumb-wrap"><img class="thumb-sm thumb-img" src="${a.cover_url}" alt="" loading="lazy"><div class="thumb-sm thumb-fallback auto-cover ${vClass}" style="display:none">${coverInner}</div></div>`;
  }
  return `<div class="thumb-sm auto-cover ${vClass}">${coverInner}</div>`;
}

/* ── V2.0 渲染 List 卡片：有图侧边小图，无图用分类渐变块；图片 fallback 用 thumb-wrap 包裹 ── */
function listCardHTML(a) {
  const dateStr = (a.published_at || a.created_at || '').split('T')[0];
  const cat = a.category || 'market';
  const thumbPart = mainListThumbHTML(a);
  return `
  <div class="list-card-v2 article-item" data-cat="${cat}" data-id="${a.id || ''}" onclick="goArticle('${a.slug}')">
    ${thumbPart}
    <div class="list-body">
      <span class="cat-badge ${a.category}" style="margin-bottom:6px;display:inline-block">${catLabel(a.category)}</span>
      <h3 class="list-title">${a.title || ''}</h3>
      ${(a.excerpt || '').trim() ? `<p class="list-excerpt">${a.excerpt}</p>` : ''}
      <div class="list-meta">${a.author || ''} · ${dateStr}${a.read_min ? ' · ' + a.read_min + ' min' : ''}</div>
    </div>
  </div>`;
}

/* ── V2.0 今日要闻（Typography-first，无图） ── */
function renderTopStories(topData) {
  const wrap = document.getElementById('top-stories-wrap');
  if (!topData) {
    wrap.innerHTML = '';
    wrap.style.display = 'none';
    return;
  }
  const dateStr = (topData.published_at || topData.created_at || '').split('T')[0];
  wrap.style.display = 'block';
  wrap.setAttribute('data-cat', topData.category);
  wrap.innerHTML = `
    <div class="top-stories" onclick="goArticle('${topData.slug}')">
      <div class="top-label">${t('top_stories','今日要闻')}</div>
      <h2 class="top-title">${topData.title || ''}</h2>
      ${(topData.excerpt || '').trim() ? `<p class="top-excerpt">${topData.excerpt}</p>` : ''}
      <div class="top-meta">
        <span>${topData.author || ''}</span>
        <span>${dateStr}</span>
        ${topData.read_min ? `<span>${topData.read_min} min read</span>` : ''}
      </div>
    </div>`;
}

/* ── 服务端分页：页码切换 ── */
function goPage(n) {
  const totalPages = Math.max(1, Math.ceil(TOTAL_COUNT / PAGE_SIZE));
  if (n < 1 || n > totalPages) return;
  currentPage = n;
  loadArticles(n);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (!el) return;
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  let html = '<div style="display:flex;justify-content:center;gap:8px;margin-top:32px;flex-wrap:wrap;">';
  if (currentPage > 1) {
    html += '<button class="filter-btn" onclick="goPage(' + (currentPage - 1) + ')">← 上一页</button>';
  }
  for (let i = 1; i <= totalPages; i++) {
    const active = i === currentPage ? ' active' : '';
    html += '<button class="filter-btn' + active + '" onclick="goPage(' + i + ')">' + i + '</button>';
  }
  if (currentPage < totalPages) {
    html += '<button class="filter-btn" onclick="goPage(' + (currentPage + 1) + ')">下一页 →</button>';
  }
  html += '</div>';
  el.innerHTML = html;
}

function renderGrid() {
  const listEl   = document.getElementById('articleList');
  const topWrap  = document.getElementById('top-stories-wrap');
  const empty    = document.getElementById('emptyState');
  const showTop  = TOP_ARTICLE && currentCat === 'all' && !currentSearch;

  if (showTop && topWrap) {
    topWrap.classList.remove('hidden');
    renderTopStories(TOP_ARTICLE);
  } else if (topWrap) {
    topWrap.classList.add('hidden');
  }

  const pageItems = (currentPage === 1 && TOP_SLUG) ? ARTICLES.filter(a => a.slug !== TOP_SLUG) : ARTICLES;

  if (ARTICLES.length === 0 && !showTop) {
    listEl.innerHTML = '';
    empty.style.display = 'block';
    renderPagination(0);
  } else {
    empty.style.display = 'none';
    listEl.innerHTML = pageItems.map(a => listCardHTML(a)).join('');
    renderPagination(TOTAL_COUNT);
    attachThumbFallback();
  }
}

function attachThumbFallback() {
  document.getElementById('articleList')?.querySelectorAll('.thumb-img').forEach(img => {
    img.onerror = null;
    img.onerror = function() {
      this.style.display = 'none';
      const fb = this.nextElementSibling;
      if (fb && fb.classList.contains('thumb-fallback')) fb.style.display = 'flex';
    };
  });
}

function filterCat(cat, btn) {
  currentCat = cat;
  currentPage = 1;
  document.querySelectorAll('.cat-chip').forEach(b => {
    b.className = 'cat-chip' + (b.dataset.cat === cat ? ' active ' + cat : '');
  });
  loadArticles(1);
}

function handleSearch(val) {
  currentSearch = val.trim();
  currentPage = 1;
  loadArticles(1);
}

function goArticle(slug) {
  window.location.href = 'article.html?slug=' + slug;
}

function handleSubscribe() {
  const email = document.getElementById('subEmail').value.trim();
  if (!email || !email.includes('@')) { alert('请输入有效的邮箱地址'); return; }
  document.getElementById('subEmail').value = '';
  const btn = document.querySelector('[onclick="handleSubscribe()"]');
  btn.textContent = '✓ 订阅成功！';
  btn.style.background = '#1e7e44';
  setTimeout(() => { btn.textContent = '免费订阅'; btn.style.background = '#00a9e0'; }, 3000);
}

/* ── 响应式侧栏 ── */
function initLayout() {
  const grid = document.getElementById('mainGrid');
  if (window.innerWidth >= 1024) {
    grid.style.gridTemplateColumns = '1fr 300px';
  } else {
    grid.style.gridTemplateColumns = '1fr';
  }
}

/* ── 阅读进度条 ── */
window.addEventListener('scroll', () => {
  const total = document.body.scrollHeight - window.innerHeight;
  document.getElementById('readingProgress').style.width = (window.scrollY / total * 100) + '%';
});

/* ── 核心：服务端分页，每次 fetch 当前页 ── */
async function loadArticles(page) {
  const p = page ?? currentPage;
  currentPage = p;
  showGridLoading();
  try {
    const params = { page: p, limit: PAGE_SIZE, is_published: true };
    if (currentCat !== 'all') params.category = currentCat;
    if (currentSearch) params.q = currentSearch;
    const data = await window.HiMiaoAPI.getArticles(params);
    const items = Array.isArray(data) ? data : (data.items || data.data || []);
    TOTAL_COUNT = data?.total ?? data?.total_count ?? items.length;
    ARTICLES = items;

    if (p === 1 && currentCat === 'all' && !currentSearch) {
      const topRes = await window.HiMiaoAPI.getArticles({ limit: 1, is_published: true }).catch(() => null);
      const topArr = topRes ? (Array.isArray(topRes) ? topRes : (topRes.items || topRes.data || [])) : [];
      const top = topArr[0] || null;
      TOP_SLUG = top ? top.slug : null;
      TOP_ARTICLE = top;
      const hotRes = await window.HiMiaoAPI.getArticles({ limit: 4, is_published: true }).catch(() => null);
      const hotArr = hotRes ? (Array.isArray(hotRes) ? hotRes : (hotRes.items || hotRes.data || [])) : [];
      document.getElementById('hotList').innerHTML = hotArr.map(a => {
        const dateStr = (a.published_at || a.created_at || '').split('T')[0];
        const meta = a.read_min ? `${a.read_min} min · ${dateStr}` : dateStr;
        const thumbPart = hotListThumbHTML(a);
        return `<div class="list-card" onclick="goArticle('${a.slug}')">${thumbPart}<div style="flex:1;min-width:0"><span class="cat-badge ${a.category}" style="margin-bottom:5px;display:inline-block">${catLabel(a.category)}</span><h4 style="font-size:12.5px;font-weight:700;color:var(--ink);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;transition:color 0.18s">${a.title || ''}</h4><span style="font-size:10px;color:var(--ink-4);font-family:'JetBrains Mono',monospace">${meta}</span></div></div>`;
      }).join('');
      attachThumbFallback();
    }

    renderGrid();
  } catch (err) {
    console.error('[HiMiao] 文章加载失败:', err);
    showGridError(`${err.message} · 请检查网络或刷新重试`);
  }
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  initLayout();
  window.addEventListener('resize', initLayout);
  loadArticles(1);
});
</script>



<script>
// ══ V8.0 Geo 软隔离 ══════════════════════════════
(function() {
    function showMainlandBanner() {
        var banner = document.createElement('div');
        banner.id = 'geo-mainland-banner';
        banner.style.cssText = [
            'position:fixed;top:0;left:0;right:0;z-index:9999',
            'background:#1d4ed8;color:white;font-size:12px',
            'padding:10px 20px;text-align:center;line-height:1.6',
            'box-shadow:0 2px 8px rgba(0,0,0,0.2)'
        ].join(';');
        banner.innerHTML = '【区域提示】本平台仅提供公开精算数据模型展示，不面向中国内地开展任何保险推介、报告下载或业务引导服务。' +
            ' / This platform provides actuarial data only and does not offer insurance services in Mainland China.';
        document.body.insertBefore(banner, document.body.firstChild);

        var hideSelectors = [
            '.dl-btn', '#download-btn', '[data-geo-hide]',
            'input[type=email]', 'form', '.contact-form'
        ];
        hideSelectors.forEach(function(sel) {
            document.querySelectorAll(sel).forEach(function(el) {
                el.style.display = 'none';
            });
        });
        document.body.style.paddingTop = '46px';
    }

    var cfMeta = document.querySelector('meta[name="cf-ipcountry"]');
    if (cfMeta && cfMeta.content === 'CN') {
        showMainlandBanner(); return;
    }

    fetch('https://ip-api.com/json/?fields=countryCode', { cache: 'no-store' })
        .then(function(r) { return r.json(); })
        .then(function(d) { if (d.countryCode === 'CN') showMainlandBanner(); })
        .catch(function() {});
})();
</script>
